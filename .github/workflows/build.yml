# GitHub Actions 构建与发布工作流

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: doudizhu-windows
            ext: .exe
          - os: ubuntu-latest
            artifact_name: doudizhu-linux
            ext: ''
          - os: macos-latest
            artifact_name: doudizhu-macos
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pygame

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name doudizhu --add-data "assets;assets" --console main.py
        shell: bash

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install pygame
          pyinstaller --onefile --name doudizhu --add-data "assets:assets" --console main.py

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          pip install pygame
          pyinstaller --onefile --name doudizhu --add-data "assets:assets" --console main.py

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/doudizhu${{ matrix.ext }}
            dist/*.dylib  # macOS相关
            dist/*.so     # Linux相关
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
            artifacts/*/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}