# GitHub Actions 构建与发布工作流

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: doudizhu-windows
            ext: .exe
            packaging: zip
          - os: ubuntu-latest
            artifact_name: doudizhu-linux
            ext: ''
            packaging: tar.gz
          - os: macos-latest
            artifact_name: doudizhu-macos
            ext: ''
            packaging: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pygame

      - name: Ensure assets directory exists
        run: |
          mkdir -p assets/cards
          mkdir -p assets/sounds

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path assets/cards,assets/sounds
          pyinstaller --onefile --name doudizhu --add-data "assets;assets" --console main.py

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install pygame
          pyinstaller --onefile --name doudizhu --add-data "assets:assets" --console main.py

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          pip install pygame
          pyinstaller --onefile --name doudizhu --add-data "assets:assets" --console main.py

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        working-directory: dist
        shell: powershell
        run: |
          Compress-Archive -Path doudizhu.exe -DestinationPath doudizhu-windows.zip
          mv doudizhu-windows.zip ../

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: dist
        run: |
          tar -czvf doudizhu-linux.tar.gz doudizhu
          mv doudizhu-linux.tar.gz ../

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        working-directory: dist
        run: |
          tar -czvf doudizhu-macos.tar.gz doudizhu
          mv doudizhu-macos.tar.gz ../

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            doudizhu*
            !doudizhu
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        working-directory: artifacts
        run: |
          find . -type f -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            artifacts/*/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}